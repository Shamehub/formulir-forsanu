<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Pendataan FORSANU</title>
  
  <!-- Tailwind CSS & Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin&family=Cinzel&family=Inter:wght@400;600;700&family=Lora&family=Merriweather&family=Montserrat&family=Playfair+Display&family=Poppins&family=Roboto+Mono&family=Work+Sans&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM Standalone -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <div id="root"></div>

  <script>
    // Inisialisasi React Elements tanpa Babel
    const e = React.createElement;
    const { useState, useEffect, useRef } = React;

    // Helper Komponen Ikon Lucide
    function LucideIcon({ name, size = 20, className = "" }) {
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [name]);
      return e('i', { 'data-lucide': name, class: className, style: { width: size, height: size, display: 'inline-block' } });
    }

    function App() {
      // Setup Configs
      const fontFamilies = [
        { id: 'font-inter', name: 'Inter (Bersih & Modern)', class: 'font-sans' },
        { id: 'font-serif', name: 'Playfair Display (Serif Klasik Elegan)', class: 'font-serif' },
        { id: 'font-mono', name: 'Roboto Mono (Minimalis & Rapi)', class: 'font-mono' },
        { id: 'font-poppins', name: 'Poppins (Geometris)', class: 'font-sans' }
      ];

      const bgThemes = [
        { id: 'dark-emerald', name: 'Medium Dark Emerald (Default)', class: 'bg-[#0d3c2f] text-slate-100', isDark: true },
        { id: 'dark-obsidian', name: 'Midnight Obsidian Black', class: 'bg-[#090d16] text-slate-100', isDark: true },
        { id: 'light-white', name: 'Cerah Pure White', class: 'bg-white text-slate-800', isDark: false },
        { id: 'light-cream', name: 'Cerah Premium Cream', class: 'bg-[#faf6ed] text-slate-950', isDark: false }
      ];

      // States
      const [appMode, setAppMode] = useState('registration');
      const [showPasswordModal, setShowPasswordModal] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [passwordError, setPasswordError] = useState('');
      const [selectedFont, setSelectedFont] = useState('font-inter');
      const [selectedBg, setSelectedBg] = useState('dark-emerald');
      const [sheetUrl, setSheetUrl] = useState('');
      
      const [headers, setHeaders] = useState({
        namalengkap: "Nama Lengkap", panggilan: "Nama Panggilan", jenisKelamin: "Jenis Kelamin",
        tempatLahir: "Tempat Lahir", tanggalLahir: "Tanggal Lahir", noHp: "Nomor Handphone WA (+62)", 
        tahunMasuk: "Tahun Masuk", status: "Status Alumni", tahunLulus: "Tahun Lulus", 
        alasanPindah: "Alasan Pindah", profesi: "Profesi / Pekerjaan Saat Ini", motto: "Motto Hidup"
      });

      const [formData, setFormData] = useState({
        namalengkap: '', panggilan: '', jenisKelamin: 'Laki-laki', tempatLahir: '',
        tanggalLahir: '', noHp: '', tahunMasuk: '', status: 'Lulus', tahunLulus: '', 
        alasanPindah: '', profesi: 'PNS', motto: '', fotoProfil: ''
      });

      const [photoBase64, setPhotoBase64] = useState(null);
      const [isCameraActive, setIsCameraActive] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null);

      const videoRef = useRef(null);
      const canvasRef = useRef(null);

      useEffect(() => {
        const savedUrl = localStorage.getItem('forsanu_sheet_url');
        if (savedUrl) setSheetUrl(savedUrl);
      }, []);

      const startCamera = async () => {
        setIsCameraActive(true);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          if (videoRef.current) videoRef.current.srcObject = stream;
        } catch (err) {
          alert("Gagal membuka kamera. Pastikan izin kamera diberikan.");
          setIsCameraActive(false);
        }
      };

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {
          videoRef.current.srcObject.getTracks().forEach(track => track.stop());
        }
        setIsCameraActive(false);
      };

      const capturePhoto = () => {
        if (videoRef.current && canvasRef.current) {
          const canvas = canvasRef.current;
          canvas.width = videoRef.current.videoWidth;
          canvas.height = videoRef.current.videoHeight;
          canvas.getContext('2d').drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
          const base64 = canvas.toDataURL('image/jpeg');
          setPhotoBase64(base64);
          setFormData(prev => ({ ...prev, fotoProfil: base64 }));
          stopCamera();
        }
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setPhotoBase64(reader.result);
            setFormData(prev => ({ ...prev, fotoProfil: reader.result }));
          };
          reader.readAsDataURL(file);
        }
      };

      const handleSubmit = async (ev) => {
        ev.preventDefault();
        if (!formData.namalengkap || !formData.noHp) {
          alert("Nama Lengkap dan Nomor HP wajib diisi!");
          return;
        }

        setIsSubmitting(true);
        const currentUrl = sheetUrl || localStorage.getItem('forsanu_sheet_url');
        
        if (!currentUrl) {
          setIsSubmitting(false);
          alert("URL Google Apps Script belum diisi oleh Admin!");
          return;
        }

        try {
          await fetch(currentUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
          });
          setSubmitStatus('success');
          alert("Data Berhasil Terkirim ke Database FORSANU!");
          setFormData({
            namalengkap: '', panggilan: '', jenisKelamin: 'Laki-laki', tempatLahir: '',
            tanggalLahir: '', noHp: '', tahunMasuk: '', status: 'Lulus', tahunLulus: '', 
            alasanPindah: '', profesi: 'PNS', motto: '', fotoProfil: ''
          });
          setPhotoBase64(null);
        } catch (error) {
          alert("Gagal mengirim data. Silakan cek koneksi internet.");
        } finally {
          setIsSubmitting(false);
        }
      };

      const activeBgObj = bgThemes.find(b => b.id === selectedBg) || bgThemes[0];

      // Struktur Tampilan Registrasi
      const renderRegistrationForm = () => {
        return e('form', { onSubmit: handleSubmit, class: 'space-y-5 mt-6' },
          e('div', { class: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
            // Nama Lengkap
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.namalengkap),
              e('input', { type: 'text', required: true, value: formData.namalengkap, onChange: (ev) => setFormData(p => ({ ...p, namalengkap: ev.target.value.toUpperCase() })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
            ),
            // Nama Panggilan
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.panggilan),
              e('input', { type: 'text', value: formData.panggilan, onChange: (ev) => setFormData(p => ({ ...p, panggilan: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
            ),
            // No HP
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.noHp),
              e('input', { type: 'text', required: true, placeholder: 'Contoh: 08123...', value: formData.noHp, onChange: (ev) => setFormData(p => ({ ...p, noHp: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
            ),
            // Jenis Kelamin
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.jenisKelamin),
              e('select', { value: formData.jenisKelamin, onChange: (ev) => setFormData(p => ({ ...p, jenisKelamin: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' },
                e('option', { value: 'Laki-laki' }, 'Laki-laki'),
                e('option', { value: 'Perempuan' }, 'Perempuan')
              )
            ),
            // Tempat Lahir
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.tempatLahir),
              e('input', { type: 'text', value: formData.tempatLahir, onChange: (ev) => setFormData(p => ({ ...p, tempatLahir: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
            ),
            // Tanggal Lahir
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.tanggalLahir),
              e('input', { type: 'date', value: formData.tanggalLahir, onChange: (ev) => setFormData(p => ({ ...p, tanggalLahir: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
            ),
            // Tahun Masuk
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.tahunMasuk),
              e('input', { type: 'number', value: formData.tahunMasuk, onChange: (ev) => setFormData(p => ({ ...p, tahunMasuk: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
            ),
            // Status
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.status),
              e('select', { value: formData.status, onChange: (ev) => setFormData(p => ({ ...p, status: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' },
                e('option', { value: 'Lulus' }, 'Lulus'),
                e('option', { value: 'Pindah' }, 'Pindah')
              )
            ),
            // Kondisional Tahun Lulus / Alasan Pindah
            formData.status === 'Lulus' 
              ? e('div', { class: 'flex flex-col gap-1' },
                  e('label', { class: 'text-xs font-bold' }, headers.tahunLulus),
                  e('input', { type: 'number', value: formData.tahunLulus, onChange: (ev) => setFormData(p => ({ ...p, tahunLulus: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
                )
              : e('div', { class: 'flex flex-col gap-1' },
                  e('label', { class: 'text-xs font-bold' }, headers.alasanPindah),
                  e('input', { type: 'text', value: formData.alasanPindah, onChange: (ev) => setFormData(p => ({ ...p, alasanPindah: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
                ),
            // Profesi
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, headers.profesi),
              e('input', { type: 'text', value: formData.profesi, onChange: (ev) => setFormData(p => ({ ...p, profesi: ev.target.value })), class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
            )
          ),
          
          // Motto
          e('div', { class: 'flex flex-col gap-1' },
            e('label', { class: 'text-xs font-bold' }, headers.motto),
            e('textarea', { value: formData.motto, onChange: (ev) => setFormData(p => ({ ...p, motto: ev.target.value })), rows: 2, class: 'px-3 py-2 text-sm rounded-lg border text-slate-900 bg-white' })
          ),

          // Upload Foto & Kamera
          e('div', { class: 'p-4 border border-dashed rounded-xl bg-black/5 flex flex-col sm:flex-row gap-4 items-center' },
            e('div', { class: 'w-24 h-32 bg-black/10 border rounded-lg overflow-hidden flex items-center justify-center shrink-0' },
              photoBase64 
                ? e('img', { src: photoBase64, class: 'w-full h-full object-cover' })
                : isCameraActive 
                  ? e('video', { ref: videoRef, autoPlay: true, playsInline: true, class: 'w-full h-full object-cover' })
                  : e('span', { class: 'text-xs opacity-50' }, 'No Foto')
            ),
            e('div', { class: 'flex flex-wrap gap-2' },
              !isCameraActive 
                ? e('button', { type: 'button', onClick: startCamera, class: 'px-3 py-1.5 bg-emerald-600 text-white text-xs font-bold rounded-lg' }, 'Buka Kamera')
                : e('button', { type: 'button', onClick: capturePhoto, class: 'px-3 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-lg' }, 'Ambil Gambar'),
              e('label', { class: 'px-3 py-1.5 bg-indigo-600 text-white text-xs font-bold rounded-lg cursor-pointer' }, 'Upload File',
                e('input', { type: 'file', accept: 'image/*', onChange: handleFileChange, class: 'hidden' })
              ),
              (photoBase64 || isCameraActive) && e('button', { type: 'button', onClick: () => { stopCamera(); setPhotoBase64(null); setFormData(p=>({ ...p, fotoProfil:'' })); }, class: 'px-3 py-1.5 bg-red-500 text-white text-xs font-bold rounded-lg' }, 'Reset')
            )
          ),

          // Tombol Submit
          e('button', { type: 'submit', disabled: isSubmitting, class: 'w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition' }, 
            isSubmitting ? 'Mengirim Data...' : 'Kirim Biodata Alumni'
          )
        );
      };

      // Struktur Pengaturan Admin
      const renderAdminForm = () => {
        return e('div', { class: 'space-y-4 mt-6' },
          e('div', { class: 'p-4 bg-blue-500/10 border border-blue-500/30 rounded-xl space-y-2' },
            e('h3', { class: 'text-sm font-bold text-blue-500' }, 'Integrasi Google Sheets URL'),
            e('input', { type: 'text', value: sheetUrl, onChange: (ev) => setSheetUrl(ev.target.value), placeholder: 'https://script.google.com/macros/s/.../exec', class: 'w-full px-3 py-2 text-xs rounded-lg border text-slate-900 bg-white' }),
            e('button', { type: 'button', onClick: () => { localStorage.setItem('forsanu_sheet_url', sheetUrl); alert('Jalur integrasi tersimpan!'); }, class: 'px-3 py-1 bg-blue-600 text-white text-xs font-bold rounded-md' }, 'Simpan Jalur URL')
          ),
          e('div', { class: 'grid grid-cols-2 gap-4' },
            e('div', { class: 'flex flex-col gap-1' },
              e('label', { class: 'text-xs font-bold' }, 'Pilih Tema Tampilan'),
              e('select', { value: selectedBg, onChange: (ev) => setSelectedBg(ev.target.value), class: 'px-3 py-2 text-xs rounded-lg border text-slate-900 bg-white' },
                bgThemes.map(t => e('option', { key: t.id, value: t.id }, t.name))
              )
            )
          ),
          e('button', { type: 'button', onClick: () => setAppMode('registration'), class: 'px-4 py-2 bg-slate-800 text-white text-xs font-bold rounded-lg' }, 'Kembali ke Formulir')
        );
      };

      return e('div', { class: `min-h-screen p-4 md:p-8 flex flex-col items-center justify-center transition-all ${activeBgObj.class}` },
        e('div', { class: `w-full max-w-2xl rounded-2xl shadow-xl p-6 md:p-8 ${activeBgObj.isDark ? 'bg-white/10 backdrop-blur-md' : 'bg-white border'}` },
          // Header Tampilan
          e('div', { class: 'flex justify-between items-center border-b pb-4 border-current/20' },
            e('div', null,
              e('h1', { class: 'text-xl font-bold tracking-tight' }, 'FORSANU'),
              e('p', { class: 'text-xs opacity-70' }, 'Forum Silaturahmi Alumni Santri Nuuwar')
            ),
            appMode === 'registration' 
              ? e('button', { onClick: () => setShowPasswordModal(true), class: 'px-3 py-1.5 bg-current/10 text-xs font-semibold rounded-lg' }, 'Admin')
              : e('button', { onClick: () => setAppMode('registration'), class: 'px-3 py-1.5 bg-red-500 text-white text-xs font-bold rounded-lg' }, 'Keluar Admin')
          ),
          
          // Form Sesuai Mode
          appMode === 'registration' ? renderRegistrationForm() : renderAdminForm()
        ),

        // Jendela Popup Password Admin
        showPasswordModal && e('div', { class: 'fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50' },
          e('div', { class: 'bg-white text-slate-900 p-5 rounded-xl w-full max-w-sm space-y-3 shadow-2xl' },
            e('h3', { class: 'font-bold text-sm' }, 'Verifikasi Akses Admin'),
            e('input', { type: 'password', placeholder: 'Masukkan Password Admin', value: passwordInput, onChange: (ev) => setPasswordInput(ev.target.value), class: 'w-full px-3 py-2 text-sm border rounded-lg bg-slate-50' }),
            passwordError && e('p', { class: 'text-xs text-red-500 font-medium' }, passwordError),
            e('div', { class: 'flex justify-end gap-2' },
              e('button', { type: 'button', onClick: () => { setShowPasswordModal(false); setPasswordInput(''); setPasswordError(''); }, class: 'px-3 py-1.5 text-xs text-slate-600' }, 'Batal'),
              e('button', { type: 'button', onClick: () => {
                if (passwordInput === 'owner01') {
                  setAppMode('modification');
                  setShowPasswordModal(false);
                  setPasswordInput('');
                  setPasswordError('');
                } else {
                  setPasswordError('Password salah!');
                }
              }, class: 'px-4 py-1.5 bg-slate-900 text-white text-xs font-bold rounded-lg' }, 'Verifikasi')
            )
          )
        )
      );
    }

    // Render ke halaman
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
